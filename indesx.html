<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>For You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        body {
            background-color: #000000;
            margin: 0;
            min-height: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .spider-web {
            width: min(90vw, 55vh);
            max-width: 440px;
            height: auto;
            display: block;
        }

        .heart-hands {
            width: min(70vw, 36vh);
            max-width: 320px;
            height: auto;
            display: block;
            margin-top: -1vh;
        }

        /* ── Web lines: clearly visible silver-grey ── */
        .web-line {
            stroke: #2e2e2e;
            stroke-width: 1;
            fill: none;
        }

        /*
         * ── Secret message: ONLY visible at max screen brightness ──
         * #1e1e1e blends into black at medium brightness.
         */
        .web-text {
            stroke: #0f0f0f;
            stroke-width: 1.3;
            fill: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            stroke-dasharray: 4, 1;
            letter-spacing: 0.5px;
        }

        /* Spider body */
        .spider {
            fill: #333333;
        }

        /* ── Heart hands: Spider-Man red ── */
        .hand-line {
            stroke: #bb1a00;
            stroke-width: 2.4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .hand-fill {
            fill: #8b1000;
            stroke: #bb1a00;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Web detail on palms — slightly lighter red */
        .hand-web {
            stroke: #cc2200;
            stroke-width: 0.9;
            fill: none;
            stroke-linecap: round;
        }

        /* Heart shape fill */
        .heart-shape {
            fill: #8b0000;
            stroke: #dd2200;
            stroke-width: 1.4;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <!-- ── SPIDER WEB + HIDDEN MESSAGE ── -->
    <svg class="spider-web" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true" focusable="false">

        <!-- Radial threads -->
        <path class="web-line"
              d="M 150 100 L 0 0
                 M 150 100 L 150 0
                 M 150 100 L 300 0
                 M 150 100 L 0 200
                 M 150 100 L 150 200
                 M 150 100 L 300 200
                 M 150 100 L 0 100
                 M 150 100 L 300 100" />

        <!-- Concentric web rings -->
        <path class="web-line" d="M 75 50 Q 150 75 225 50 Q 262 100 225 150 Q 150 125 75 150 Q 37 100 75 50 Z" />
        <path class="web-line" d="M 37 25 Q 150 60 262 25 Q 300 100 262 175 Q 150 140 37 175 Q 0 100 37 25 Z" />

        <!-- Hidden message — visible ONLY at max brightness -->
        <text text-anchor="middle" class="web-text" letter-spacing="1">
            <tspan x="50%" y="42%">I will miss you, Samridhi :)</tspan>
            <tspan x="50%" y="54%">Please take care of yourself.</tspan>
            <tspan x="50%" y="66%">Know this, I love you so much...</tspan>
        </text>

        <!-- Hanging spider -->
        <line x1="250" y1="0" x2="250" y2="40" class="web-line" />
        <circle cx="250" cy="42" r="5" class="spider" />
        <path class="web-line"
              d="M 244 38 Q 238 34 244 42
                 M 256 38 Q 262 34 256 42
                 M 244 46 Q 238 50 244 42
                 M 256 46 Q 262 50 256 42" />
    </svg>

    <!-- ── SPIDER-MAN HEART HANDS ── -->
    <!--
        The viral Spider-Man heart: two web-shooting hands
        (thumb + index + pinky extended, middle + ring curled)
        tilted toward each other, index fingertips touching at the
        top of a heart shape. Spider-Man red on black.
    -->
    <svg class="heart-hands" viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true" focusable="false">

        <!-- ═══ LEFT HAND (rotated ~25° clockwise, palm faces viewer) ═══ -->
        <g transform="translate(90,110) rotate(25)">

            <!-- Palm body -->
            <path class="hand-fill"
                  d="M -30 20 Q -38 14 -38 2 Q -38 -10 -30 -18
                     Q -22 -24 -14 -20 L -12 -14
                     Q -10 -24 -2 -26 Q 6 -28 8 -20 L 8 -14
                     Q 10 -26 18 -26 Q 26 -24 26 -16 L 24 -10
                     Q 26 -22 34 -20 Q 42 -18 40 -8 L 36 10
                     Q 34 22 24 28 Q 14 32 0 32 Q -14 32 -24 26 Z" />

            <!-- Curled middle finger (knuckle visible) -->
            <path class="hand-line"
                  d="M -12 -14 Q -14 -30 -10 -38 Q -6 -44 0 -40 Q 6 -36 4 -24 L 4 -14" />

            <!-- Curled ring finger (knuckle visible) -->
            <path class="hand-line"
                  d="M 8 -14 Q 8 -30 12 -38 Q 16 -44 22 -40 Q 28 -36 26 -24 L 24 -10" />

            <!-- Extended INDEX finger — goes up-right to meet at heart top -->
            <path class="hand-line"
                  d="M -30 -18 Q -36 -34 -40 -52 Q -42 -62 -36 -66
                     Q -30 -68 -26 -60 Q -22 -50 -22 -36 L -22 -20" />

            <!-- Extended PINKY — goes outward-down -->
            <path class="hand-line"
                  d="M 36 10 Q 48 14 56 26 Q 60 34 56 40
                     Q 52 44 48 38 Q 44 32 40 20 L 36 10" />

            <!-- Extended THUMB — arcs down toward center -->
            <path class="hand-line"
                  d="M -30 20 Q -44 28 -50 42 Q -54 52 -48 58
                     Q -42 62 -36 54 Q -32 46 -30 34 L -28 20" />

            <!-- Web detail lines on palm -->
            <path class="hand-web" d="M -18 4 Q 0 -2 18 4" />
            <path class="hand-web" d="M -22 14 Q 0 8 22 14" />
            <path class="hand-web" d="M -4 -8 L -4 20" />
            <path class="hand-web" d="M 8 -8 L 8 20" />
        </g>

        <!-- ═══ RIGHT HAND (mirrored, rotated ~25° counter-clockwise) ═══ -->
        <g transform="translate(190,110) rotate(-25) scale(-1,1)">

            <!-- Palm body (same shape, mirrored) -->
            <path class="hand-fill"
                  d="M -30 20 Q -38 14 -38 2 Q -38 -10 -30 -18
                     Q -22 -24 -14 -20 L -12 -14
                     Q -10 -24 -2 -26 Q 6 -28 8 -20 L 8 -14
                     Q 10 -26 18 -26 Q 26 -24 26 -16 L 24 -10
                     Q 26 -22 34 -20 Q 42 -18 40 -8 L 36 10
                     Q 34 22 24 28 Q 14 32 0 32 Q -14 32 -24 26 Z" />

            <!-- Curled middle finger -->
            <path class="hand-line"
                  d="M -12 -14 Q -14 -30 -10 -38 Q -6 -44 0 -40 Q 6 -36 4 -24 L 4 -14" />

            <!-- Curled ring finger -->
            <path class="hand-line"
                  d="M 8 -14 Q 8 -30 12 -38 Q 16 -44 22 -40 Q 28 -36 26 -24 L 24 -10" />

            <!-- Extended INDEX finger — goes up-left to meet at heart top -->
            <path class="hand-line"
                  d="M -30 -18 Q -36 -34 -40 -52 Q -42 -62 -36 -66
                     Q -30 -68 -26 -60 Q -22 -50 -22 -36 L -22 -20" />

            <!-- Extended PINKY -->
            <path class="hand-line"
                  d="M 36 10 Q 48 14 56 26 Q 60 34 56 40
                     Q 52 44 48 38 Q 44 32 40 20 L 36 10" />

            <!-- Extended THUMB -->
            <path class="hand-line"
                  d="M -30 20 Q -44 28 -50 42 Q -54 52 -48 58
                     Q -42 62 -36 54 Q -32 46 -30 34 L -28 20" />

            <!-- Web detail lines on palm -->
            <path class="hand-web" d="M -18 4 Q 0 -2 18 4" />
            <path class="hand-web" d="M -22 14 Q 0 8 22 14" />
            <path class="hand-web" d="M -4 -8 L -4 20" />
            <path class="hand-web" d="M 8 -8 L 8 20" />
        </g>

        <!-- ═══ HEART SHAPE at center where index fingers meet ═══ -->
        <path class="heart-shape"
              d="M 140 58
                 C 128 40, 108 40, 108 62
                 C 108 80, 125 96, 140 112
                 C 155 96, 172 80, 172 62
                 C 172 40, 152 40, 140 58 Z" />

        <!-- Web silk threads dangling from both index fingertips -->
        <line x1="53"  y1="44"  x2="53"  y2="66"  class="hand-web" stroke-opacity="0.7"/>
        <line x1="227" y1="44"  x2="227" y2="66"  class="hand-web" stroke-opacity="0.7"/>
    </svg>

</body>
</html>
